<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Secret Unlocked</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />

    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-CPB3LMSKJ2"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-CPB3LMSKJ2");
    </script>

    <style>
      :root {
        --bg: #0d0d0d;
        --text: #ffffff;
        --muted: #aaa;
        --pink: #ff0099;
        --orange: #ff9e00;
        --yellow: #ffbe0b;
        --line: rgba(255, 255, 255, 0.14);
        --gradient: linear-gradient(
          90deg,
          var(--pink),
          var(--orange),
          var(--yellow)
        );
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: linear-gradient(120deg, #0d0d0d, #151515 55%, #0d0d0d);
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        text-align: center;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px
          );
        background-size: 52px 52px;
        pointer-events: none;
      }

      main {
        position: relative;
        z-index: 2;
        width: min(680px, calc(100% - 2rem));
      }

      .kicker {
        margin: 0 0 1rem;
        color: var(--orange);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.82rem;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: transparent;
        background: var(--gradient);
        background-clip: text;
        -webkit-background-clip: text;
        font-size: clamp(3rem, 10vw, 6.5rem);
        line-height: 0.9;
        animation: pop 0.75s ease both;
      }

      p {
        max-width: 520px;
        margin: 1.5rem auto 0;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.75;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3.2rem;
        margin-top: 2rem;
        padding: 0 1.4rem;
        border: 1px solid rgba(255, 158, 0, 0.54);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-weight: 800;
        text-decoration: none;
        transition:
          transform 0.22s ease,
          border-color 0.22s ease,
          box-shadow 0.22s ease;
      }

      .button:hover,
      .button:focus-visible {
        transform: translateY(-2px);
        border-color: var(--pink);
        box-shadow: 0 0 26px rgba(255, 0, 153, 0.2);
        outline: none;
      }

      .emoji {
        position: absolute;
        top: -50px;
        font-size: 2rem;
        opacity: 0.8;
        pointer-events: none;
        animation: fall 4s linear infinite;
      }

      @keyframes fall {
        to {
          top: 100vh;
          transform: rotate(460deg);
        }
      }

      @keyframes pop {
        from {
          transform: translateY(16px) scale(0.96);
          opacity: 0;
        }
        to {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">All secrets found</p>
      <h1>Secret Unlocked</h1>
      <p>
        That was some serious digging. Not many make it this far, so your
        curiosity has officially been logged as impressive.
      </p>
      <a href="index.html" class="button">Back to Main</a>
    </main>

    <script>
      const emojis = ["💡", "👀", "✨", "🚀", "🎮"];
      for (let i = 0; i < 12; i += 1) {
        const el = document.createElement("div");
        el.classList.add("emoji");
        el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.fontSize = 1 + Math.random() * 1.5 + "rem";
        el.style.animationDuration = 5 + Math.random() * 2 + "s";
        document.body.appendChild(el);
      }
    </script>
  </body>
</html>
